spring:
  datasource:
    url: ${WAR_DB_URL:jdbc:postgresql://localhost:5432/war_campaign}
    username: ${WAR_DB_USERNAME:war}
    password: ${WAR_DB_PASSWORD:war}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
