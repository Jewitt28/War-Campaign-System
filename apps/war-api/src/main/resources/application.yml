spring:
  datasource:
    url: ${WAR_DB_URL:jdbc:postgresql://localhost:5432/war_campaign}
    username: ${WAR_DB_USERNAME:war}
    password: ${WAR_DB_PASSWORD:war}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

app:
  security:
    dev-auth:
      enabled: ${WAR_DEV_AUTH_ENABLED:false}
  jobs:
    enabled: ${WAR_JOBS_ENABLED:false}
    phase-expiry-delay: ${WAR_JOBS_PHASE_EXPIRY_DELAY:PT1M}
    reminder-delay: ${WAR_JOBS_REMINDER_DELAY:PT15M}
    visibility-delay: ${WAR_JOBS_VISIBILITY_DELAY:PT1H}
    snapshot-delay: ${WAR_JOBS_SNAPSHOT_DELAY:PT6H}
    phase-reminder-window: ${WAR_JOBS_PHASE_REMINDER_WINDOW:PT30M}
    invite-reminder-window: ${WAR_JOBS_INVITE_REMINDER_WINDOW:PT24H}
    snapshot-directory: ${WAR_JOBS_SNAPSHOT_DIRECTORY:target/campaign-snapshots}
